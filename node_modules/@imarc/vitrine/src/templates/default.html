<!DOCTYPE h>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>{{ name }}</title>
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg width='256' height='256' viewBox='0 0 256 256' fill='none' xmlns='http://www.w3.org/2000/svg'><rect width='256' height='256' rx='20.48' fill='%23850080'/><rect x='80.0509' y='46' width='19.2941' height='164' fill='%23ffffff'/><path d='M99.345 140.222V46H139.19C154.347 46 165.91 50.1408 173.879 58.4223C181.848 66.7038 185.832 78.2667 185.832 93.1109C185.832 107.955 181.848 119.518 173.879 127.8C165.91 136.081 154.347 140.222 139.19 140.222H99.345ZM99.345 123.112H138.721C147.003 123.112 153.409 121.081 157.941 117.018C162.628 112.799 164.972 106.861 164.972 99.2049V87.017C164.972 79.3605 162.628 73.5009 157.941 69.4383C153.409 65.2194 147.003 63.1099 138.721 63.1099H99.345V123.112Z' fill='url(%23paint0_linear_5502_40)'/><defs><linearGradient id='paint0_linear_5502_40' x1='108.389' y1='71.3235' x2='81.2567' y2='140.059' gradientUnits='userSpaceOnUse'><stop stop-color='%23ffffff'/><stop offset='1' stop-color='%23ffffff' stop-opacity='0'/></linearGradient></defs></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <style>
    @view-transition {
        navigation: auto;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Avenir, Montserrat, Corbel, 'URW Gothic', source-sans-pro, sans-serif;
      margin: 0;
    }
    a:not(:hover) {
      text-decoration: none;
    }
    #root {
      background: conic-gradient(#0002 90deg, #0000 90deg 180deg, #0002 180deg 270deg, #0000 270deg) #444 top / 2em 2em;
      display: grid;
      grid: "aside main" auto "aside main" 1fr / 200px 1fr;
      height: 100%;

      &:has(.hide-code :checked) {
        grid-template-rows: 1fr auto;

        .preview {
          height: auto;
        }
      }
    }
    aside {
      background: #2c2c2c;
      color: #fff;
      display: flex;
      flex-flow: column;
      font-size: 14px;
      grid-row: aside;
      line-height: 1.5;
      max-height: 100vh;
      overflow: scroll;

      summary {
        cursor: pointer;
        list-style: none;

        &::-webkit-details-marker {
          display: none;
        }
      }
      
      h1 {
        font-size: 16px;
        text-align: center;
        padding: 1rem;
        margin-bottom: 0;

        svg, img {
          max-width: 100%;
          max-height: 1rem;
        }
      }

      a {
        color: #fff;

        &:visited {
          color: #ccc;
        }
      }
      
      ul {
        list-style: none;
        padding: 0;
      }

      summary,
      summary > a,
      li > a {
        display: flex;
        gap: .25em;
      }
      
      summary,
      li > a {
        border-radius: 5px;
        margin: 0 10px 4px 4px;
        padding: .25em .5em;
        transition: all 150ms cubic-bezier(0.22, 1, 0.36, 1);
        user-select: none;

        &.active,
        &:hover {
          background: #fff1;
          color: #fff;
        }
        
        ul ul & { padding-left: 2em; }
        ul ul ul & { padding-left: 3em; }
        ul ul ul ul & { padding-left: 4em; }
        ul ul ul ul ul & { padding-left: 5em; }
      }
      
      summary::after {
        opacity: .75;
        content: '⏵';
        margin-left: auto;
      }
      
      details[open] > summary::after {
        content: '⏷';
        opacity: .25;
      }

      .version {
        align-self: center;
        font-variant-numeric: lining-nums;
        margin-top: auto;
        opacity: .5;
        padding: 1em;
      }
    }
    .documentation {
      background: #fff;
      font-family: Merriweather, Rockwell, 'Rockwell Nova', 'Roboto Slab', 'DejaVu Serif', 'Sitka Small', serif;
      grid-area: main;
      line-height: 1.75;
      color: #000b;
      padding: 2rem max(clamp(2rem, 5vw, 5rem), 100% - 960px - 5rem) 2rem clamp(2rem, 5vw, 5rem);
      overflow-x: scroll;

      h1 { font-size: 4rem }
      h2 { font-size: 2rem }
      h3 { font-size: 1.6875rem }
      h4 { font-size: 1.375rem }
      h5 { font-size: 1.1875rem }
      h6 { font-size: 1rem }

      h1, h2, h3, h4, h5, h6 {
        color: #000;
        margin: 0 0 1rem;
      }

      ul, ol, p, pre, table {
        margin: 0 0 2rem;
      }
    }
    .showcase {
      background: #fff;
      height: 100vh;
      overflow: auto;
      
      .components {
        display: grid;
        grid: auto / repeat(auto-fill, minmax(20rem, 1fr));
        gap: 3rem;
        padding: 0 1rem;
        
        h2 {
          grid-column: 1 / -1;
        }
      }
      
      .example {
        max-height: 20rem;
        overflow: hidden;
        display: grid;

        .example-link,
        .example__pane {
          grid-area: 1 / 1;
        }

        .example__pane {
          width: 100vw;
          pointer-events: none;
        }
      }
      
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
    }
    .preview {
      background: #fff;
      border: 3px ridge;
      height: 50vh;
      justify-self: center;
      margin: .5em 0;
      max-width: calc(100vw - 200px);
      overflow: auto;
      position: relative;
      resize: both;
      width: min(100% - 32px, 1364px);

      iframe {
        border: 0;
        height: 100%;
        width: 100%;
      }
    }

    .fullscreen,
    .hide-code {
      position: absolute;
      opacity: .5;
     
      color: black;
      font-weight: bold;
      padding: 0 .25em;
      right: 0;
      user-select: none;
      &:hover {
        opacity: 1;
        text-decoration: none;
      }
    }

    .hide-code {
      right: 1em;
      input { display: none; }
    }

    .files {
      display: flex;
      flex-flow: row wrap;
      gap: 0 .25em;
      container-type: size;
      position: relative;

      > div {
        display: contents;
      }

      > div > a {
        padding: .25em .5em;
        background: #555;
        border-radius: .5em .5em 0 0;
        color: #fff;
        order: -1;

        &:hover {
          background: color-mix(in srgb, #555, #1a1b26);
          text-decoration: none;
        }
      }

      a:target {
        background: #1a1b26;

        + .file {
          display: grid;
        }
      }

      &:not(:has(:target)) {
        > div:first-child > a {
          background: #1a1b26;

          + .file {
            display: grid;
          }
        }
      }

      .file {
        display: none;
        width: 100%;
        height: calc(100cqh - 1.75rem);
        overflow: scroll;
      }

      pre {
        margin: 0;
        code {
          min-height: 100%;
          padding-top: 2em;
        }
      }
    }
    </style>
  </head>
  <body>
    <div id="root">
      <aside>
        <h1><a :href="server.prefix" v-html="logo || name"></a></h1>
        <RecursiveList :data="components.toArray()" />
        <div class="version">{{ version }}</div>
      </aside>
      <main v-if="typeof component === 'undefined'" class="documentation">
        <h1>404'd!</h1>
      </main>
      <main v-else-if="component.url === undefined" class="documentation">
        <script
          v-if="components.toArray().find(c => c.url)?.url"
          v-html="`window.location = '${components.toArray().find(c => c.url).url}'`"
        ></script>
        <h1>Welcome!</h1>
        <h2>This is your component library.</h2>
        <p>
          You don't have any components yet. If you do have some compoments,
          <template v-if="server.basePaths.length">
            make sure that they are in: <code>{{ server.basePaths.map(p => p.dir).join(", ") }}</code>
          </template>
          <template v-else>
            make sure to configure Vitrine's <code>basePaths</code>.
          </template>
        </p>
      </main>
      <main
        v-if="component?.type === 'directory'"
        class="showcase"
      >
        <a class="fullscreen" target="_parent" :href="component.url + '/@html'" title="Open example fullscreen">⛶</a>
        <iframe :src="component.url + '/@html'"></iframe>
      </main>
      <main
        v-else-if="component?.filetype === 'md'"
        class="documentation"
        v-html="markdown(code)">
      </main>
      <template v-else-if="component">
        <main class="preview" id="app">
          <a class="fullscreen" :href="component.url + '/@html'" title="Open example fullscreen">⛶</a>
          <label class="hide-code" title="Toggle bottom code panel"><input type="checkbox">⬒</label>
          <iframe :src="component.url + '/@html'"></iframe>
        </main>
        <div class="files">
          <div v-for="(file, i) in related">
            <a :href="`#${i == 0 ? '' : file.slug}`" :id="file.slug">{{ file.name }}</a>
            <div class="file">
              <pre><code>{{ encode(file.code) }}</code></pre>
            </div>
          </div>
        </div>
      </template>
    </div>
    <script>
      hljs.highlightAll()
      const path = location.pathname.replace(/\/$/, '')
      document.querySelector(`aside a[href^="${path}" i]`).classList.add('active')

      const detailsState = sessionStorage.getItem('detailsState')?.split(',').map(v => parseInt(v)) || [ 1 ]
      const details = [...document.querySelectorAll('aside details')]

      const toggle = ({ target }) => {
        detailsState[details.indexOf(target)] = target.open ? 1 : 0
        sessionStorage.setItem('detailsState', detailsState.join())
      }

      details.forEach((e, i) => {
        e.open = detailsState?.[i]
        e.addEventListener('toggle', toggle)
      })

      const hideCodeEl = document.querySelector('.hide-code input')
      if (hideCodeEl) {
        hideCodeEl.checked = sessionStorage.getItem('hideCode') === 'true'
        hideCodeEl.addEventListener('change', evt => sessionStorage.setItem('hideCode', evt.target.checked))
      }
    </script>
  </body>
</html>
